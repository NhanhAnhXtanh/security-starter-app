spring:
  profiles:
    active: dev
  application:
    name: db-react-springboot-be

  main:
    # Lets AsyncOverrideConfig#taskExecutor override starter's broken
    # AsyncConfiguration bean (incompatible with Spring Boot 4 reflection).
    allow-bean-definition-overriding: true

  datasource:
    url: jdbc:postgresql://localhost:5432/db_react_springboot
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    # Defer data.sql until AFTER Hibernate creates schema (sec_permission table
    # comes from the starter; data.sql seeds it post-creation).
    defer-datasource-initialization: true
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
      hibernate.jdbc.time_zone: Asia/Ho_Chi_Minh

  sql:
    init:
      mode: always

  # Starter ships Liquibase but we let Hibernate ddl-auto handle schema in dev.
  liquibase:
    enabled: false

  # Starter ships spring-boot-starter-mail; suppress mail health until configured.
  mail:
    host: localhost

server:
  port: 8081

management:
  health:
    mail:
      enabled: false

# Security Core starter — authorization only.
# Consumer owns authentication (see app.jwt / app.seed below).
security-core:
  cors:
    allowed-origins: 'http://localhost:3000,http://localhost:5173,http://localhost:4200'
    allowed-methods: '*'
    allowed-headers: '*'
    allow-credentials: true
    max-age: 1800
  fetch-plans:
    config: classpath:fetch-plans.yml
  cache:
    enabled: true

# Consumer-owned auth (this app)
app:
  jwt:
    # DEV ONLY — rotate before production. HS512, base64-encoded 64+ byte key.
    base64-secret: 1W/dgYDz2SfLLj2WgUkOrQclguYVhYPsLZE0rJ2za+UrYXPG0yPXN3lLk6HVXLyp43tMTEZ/dqkr+Oe4/skxjQ==
    access-token-ttl-seconds: 86400
    refresh-token-ttl-seconds: 2592000
  seed:
    # DEV ONLY — bootstraps an admin/admin user on first boot. Disable in prod.
    enabled: true
    username: admin
    password: admin
    email: admin@localhost

# MetaSync auto-polling (existing project feature)
metasync:
  polling:
    enabled: true
    cron: '*/30 * * * * *'

# Hazelcast client — bật để app kết nối tới member Hazelcast trên Docker
# thay vì khởi tạo embedded instance trong JVM.
app.hazelcast.client:
  enabled: true
  cluster-name: dev
  members: 127.0.0.1:5701
